openapi: 3.0.1
info:
  title: EV Charging Public API
  version: 1.0.0
  description: Public API for electric vehicle charging stations.

servers:
  - url: https://localhost:8000

paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string

        '500':
          $ref: '#/components/responses/ErrorResponse'

  /welcome:
    get:
      summary: Get list of charging stations for the welcome page (unauthenticated)
      responses:
        '200':
          description: List of charging stations data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Station'

        '400':
          $ref: '#/components/responses/ErrorResponse'

        '500':
          $ref: '#/components/responses/ErrorResponse'

components:

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              example: INTERNAL_ERROR
            message:
              type: string
              example: Internal server error

    Station:
      type: object
      required: [id, address, providerName, maxPowerKw, portCount]
      properties:
        id:
          type: string
        address:
          type: string
        providerName:
          type: string
        maxPowerKw:
          type: integer
        portCount:
          type: integer

  responses:

    ErrorResponse:
      description: Standard error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'