AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Charging Stations Lambda - invokable from another account

Globals:
  Function:
    Runtime: python3.13
    MemorySize: 128
    Timeout: 10

Parameters:

  InvokerAccountIdA:
    Type: String
    Description: AWS account ID that is allowed to invoke this Lambda (e.g. the account that runs Node.js and calls Invoke)
    Default: "773769103104"

  InvokerAccountIdB:
    Type: String
    Description: AWS account ID that is allowed to invoke this Lambda (e.g. the account that runs Node.js and calls Invoke)
    Default: ""
  # VPC and subnets (must be private subnets that can reach each other)
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC for Lambda and RDS
    Default: vpc-0d3987aee1c745343

  PrivateSubnet1Id:
    Type: AWS::EC2::Subnet::Id
    Description: First private subnet (for RDS and Lambda)
    Default: subnet-097b4a2befe615aad

  PrivateSubnet2Id:
    Type: AWS::EC2::Subnet::Id
    Description: Second private subnet (RDS multi-AZ subnet group needs ≥2; for single-AZ one is enough but group still needs 2)
    Default: subnet-05bdebc566310d684
  # DB credentials (stored in parameter; for production prefer Secrets Manager)
  DBName:
    Type: String
    Description: Name of the database
    Default: charging_stations_rds_postgres
  # Optional: instance class and storage
  DBInstanceClass:
    Type: String
    Default: db.t4g.micro
    Description: Instance class for RDS PostgreSQL
  DBAllocatedStorage:
    Type: String
    Default: "20"
    Description: Allocated storage for RDS PostgreSQL

  DBSecretArn:
    Type: String
    Description: ARN of existing DB secret
    Default: arn:aws:secretsmanager:il-central-1:852215679994:secret:charging-stations-rds-postgres-credentials-adUrnW
  

  
Conditions:
  UseInvokerAccountA: !Not [!Equals [!Ref InvokerAccountIdA, ""]]
  UseInvokerAccountB: !Not [!Equals [!Ref InvokerAccountIdB, ""]]

Resources:

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: charging-stations-user-pool
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
        - Name: name
          AttributeDataType: String
          Required: true
          Mutable: true
      LambdaConfig:
        PostAuthentication: !GetAtt WriteUserRDSFunction.Arn
        PostConfirmation:  !GetAtt WriteUserRDSFunction.Arn

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref UserPool
      ClientName: charging-stations-client
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

  AdminGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: ADMIN
      UserPoolId: !Ref UserPool
      Description: Admin users for console
      Precedence: 1
      
  SupportGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: SUPPORT
      UserPoolId: !Ref UserPool
      Description: Support users
      Precedence: 10

  CommonToolsLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      ContentUri: layers/common
      CompatibleRuntimes:
        - python3.13
        - python3.12
      Description: Common tools for Lambdas

  CommonLoggerLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      ContentUri: layers/common
      CompatibleRuntimes:
        - python3.13
        - python3.12
      Description: Common logger for charging-stations Lambdas

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for Charging Stations RDS
      SubnetIds:
        - !Ref PrivateSubnet1Id
        - !Ref PrivateSubnet2Id
      
  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for DB operating Lambdas
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Charging Stations RDS
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref LambdaSecurityGroup

  RDSApiVpcEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VpcId
      VpcEndpointType: Interface
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.rds"
      SubnetIds:
        - !Ref PrivateSubnet1Id
        - !Ref PrivateSubnet2Id
      SecurityGroupIds:
        - !Ref RDSApiEndpointSecurityGroup
      PrivateDnsEnabled: true

  RDSApiEndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for RDS API VPC endpoint
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref LambdaSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  CognitoIdPApiEndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Cognito IdP API VPC endpoint
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref LambdaSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  CognitoIdPVpcEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VpcId
      VpcEndpointType: Interface
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.cognito-idp"
      SubnetIds:
        - !Ref PrivateSubnet1Id
        - !Ref PrivateSubnet2Id
      SecurityGroupIds:
        - !Ref CognitoIdPApiEndpointSecurityGroup
      PrivateDnsEnabled: true

  ChargingStationsRDSPostgresDB:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    Properties:
      DBInstanceIdentifier: charging-stations-rds-postgres
      Engine: postgres
      EngineVersion: "18.1"
      DBInstanceClass: !Ref DBInstanceClass
      AllocatedStorage: !Ref DBAllocatedStorage
      StorageType: gp2
      MasterUsername: !Sub "{{resolve:secretsmanager:${DBSecretArn}:SecretString:username}}"
      MasterUserPassword: !Sub "{{resolve:secretsmanager:${DBSecretArn}:SecretString:password}}"
      DBName: !Ref DBName
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref RDSSecurityGroup
      MultiAZ: false
      PubliclyAccessible: false
      EnableIAMDatabaseAuthentication: true

  WriteUserRDSFunction:
    Type: AWS::Serverless::Function
    DependsOn: ChargingStationsRDSPostgresDB
    Properties:
      Runtime: python3.12
      FunctionName: charging-stations-write-user-rds
      Handler: write_sign_up_user_rds.handler
      CodeUri: db/write
      Layers:
        - !Ref CommonToolsLayer
        - !Sub "arn:aws:lambda:${AWS::Region}:770693421928:layer:Klayers-p312-psycopg2-binary:2"
      Description: Write user to RDS and add to Cognito group
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !Ref PrivateSubnet1Id
          - !Ref PrivateSubnet2Id
      Environment:
        Variables:
          DB_HOST: !GetAtt ChargingStationsRDSPostgresDB.Endpoint.Address
          DB_PORT: "5432"
          DB_NAME: !Ref DBName
          DB_USER: !Sub "{{resolve:secretsmanager:${DBSecretArn}:SecretString:username}}"

      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action: rds-db:connect
              Resource: !Sub
                - "arn:aws:rds-db:${AWS::Region}:${AWS::AccountId}:dbuser:${DBResourceId}/${DBUser}"
                - DBResourceId: !GetAtt ChargingStationsRDSPostgresDB.DbiResourceId
                  DBUser: !Sub "{{resolve:secretsmanager:${DBSecretArn}:SecretString:username}}"
            - Effect: Allow
              Action: cognito-idp:AdminAddUserToGroup
              Resource: !Sub "arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/*"

  GetUserInfoFunction:
    Type: AWS::Serverless::Function
    DependsOn: ChargingStationsRDSPostgresDB
    Properties:
      Runtime: python3.12
      FunctionName: charging-stations-get-user-info
      Handler: get_user_info.handler
      CodeUri: db/read
      Layers:
        - !Ref CommonToolsLayer
        - !Sub "arn:aws:lambda:${AWS::Region}:770693421928:layer:Klayers-p312-psycopg2-binary:2"
      Description: Get user info from RDS
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !Ref PrivateSubnet1Id
          - !Ref PrivateSubnet2Id
      Environment:
        Variables:
          DB_HOST: !GetAtt ChargingStationsRDSPostgresDB.Endpoint.Address
          DB_PORT: "5432"
          DB_NAME: !Ref DBName
          DB_USER: !Sub "{{resolve:secretsmanager:${DBSecretArn}:SecretString:username}}"
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action: rds-db:connect
              Resource: !Sub
                - "arn:aws:rds-db:${AWS::Region}:${AWS::AccountId}:dbuser:${DBResourceId}/${DBUser}"
                - DBResourceId: !GetAtt ChargingStationsRDSPostgresDB.DbiResourceId
                  DBUser: !Sub "{{resolve:secretsmanager:${DBSecretArn}:SecretString:username}}"

  GetUserInfoInvokePermissionA:
    Type: AWS::Lambda::Permission
    Condition: UseInvokerAccountA
    Properties:
      FunctionName: !Ref GetUserInfoFunction
      Action: lambda:InvokeFunction
      Principal: !Sub "arn:aws:iam::${InvokerAccountIdA}:root"
      
  GetUserInfoInvokePermissionB:
    Type: AWS::Lambda::Permission
    Condition: UseInvokerAccountB
    Properties:
      FunctionName: !Ref GetUserInfoFunction
      Action: lambda:InvokeFunction
      Principal: !Sub "arn:aws:iam::${InvokerAccountIdB}:root"

  CreateRDSTablesFunction:
    Type: AWS::Serverless::Function
    Properties:
      Timeout: 30
      Runtime: python3.12
      FunctionName: charging-stations-create-rds-tables
      Handler: create_rds_tables.handler
      CodeUri: db
      Layers:
        - !Ref CommonToolsLayer
        - !Sub "arn:aws:lambda:${AWS::Region}:770693421928:layer:Klayers-p312-psycopg2-binary:2"
      Description: Create RDS tables
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !Ref PrivateSubnet1Id
          - !Ref PrivateSubnet2Id
      Environment:
        Variables:
          DB_HOST: !GetAtt ChargingStationsRDSPostgresDB.Endpoint.Address
          DB_PORT: "5432"
          DB_NAME: !Ref DBName
          DB_USER: !Sub "{{resolve:secretsmanager:${DBSecretArn}:SecretString:username}}"
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action: rds-db:connect
              Resource: !Sub
                - "arn:aws:rds-db:${AWS::Region}:${AWS::AccountId}:dbuser:${DBResourceId}/${DBUser}"
                - DBResourceId: !GetAtt ChargingStationsRDSPostgresDB.DbiResourceId
                  DBUser: !Sub "{{resolve:secretsmanager:${DBSecretArn}:SecretString:username}}"
  # Cross-account: only when InvokerAccountId is provided
  CreateRDSTablesInvokePermissionA:
    Type: AWS::Lambda::Permission
    Condition: UseInvokerAccountA
    Properties:
      FunctionName: !Ref CreateRDSTablesFunction
      Action: lambda:InvokeFunction
      Principal: !Sub "arn:aws:iam::${InvokerAccountIdA}:root"
      
  CreateRDSTablesInvokePermissionB:
    Type: AWS::Lambda::Permission
    Condition: UseInvokerAccountB
    Properties:
      FunctionName: !Ref CreateRDSTablesFunction
      Action: lambda:InvokeFunction
      Principal: !Sub "arn:aws:iam::${InvokerAccountIdB}:root"

  WriteUserRDSInvokePermissionA:
    Type: AWS::Lambda::Permission
    Condition: UseInvokerAccountA
    Properties:
      FunctionName: !Ref WriteUserRDSFunction
      Action: lambda:InvokeFunction
      Principal: !Sub "arn:aws:iam::${InvokerAccountIdA}:root"
      
  WriteUserRDSInvokePermissionB:
    Type: AWS::Lambda::Permission
    Condition: UseInvokerAccountB
    Properties:
      FunctionName: !Ref WriteUserRDSFunction
      Action: lambda:InvokeFunction
      Principal: !Sub "arn:aws:iam::${InvokerAccountIdB}:root"

  CognitoInvokeWriteUserRDSPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref WriteUserRDSFunction
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt UserPool.Arn

  ConfirmConsoleCreatedAdminFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: charging-stations-confirm-console-created-admin
      Handler: confirm_console_created_admin.handler
      CodeUri: db
      Layers:
        - !Ref CommonLoggerLayer
      Description: Confirm console created admin
      Environment:
        Variables:
          COGNITO_CLIENT_ID: !Ref UserPoolClient
          COGNITO_REGION: !Ref AWS::Region
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - cognito-idp:InitiateAuth
                - cognito-idp:RespondToAuthChallenge
              Resource: !GetAtt UserPool.Arn

  ConfirmConsoleCreatedAdminInvokePermissionA:
    Type: AWS::Lambda::Permission
    Condition: UseInvokerAccountA
    Properties:
      FunctionName: !Ref ConfirmConsoleCreatedAdminFunction
      Action: lambda:InvokeFunction
      Principal: !Sub "arn:aws:iam::${InvokerAccountIdA}:root"
      
  ConfirmConsoleCreatedAdminInvokePermissionB:
    Type: AWS::Lambda::Permission
    Condition: UseInvokerAccountB
    Properties:
      FunctionName: !Ref ConfirmConsoleCreatedAdminFunction
      Action: lambda:InvokeFunction
      Principal: !Sub "arn:aws:iam::${InvokerAccountIdB}:root"
      
  HealthFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: charging-stations-health
      Handler: app.handler
      CodeUri: routes/health
      Layers:
        - !Ref CommonLoggerLayer
      Description: Health check - returns {"code":200,"status":"running"}

  # Cross-account: only when InvokerAccountId is provided
  HealthInvokePermissionA:
    Type: AWS::Lambda::Permission
    Condition: UseInvokerAccountA
    Properties:
      FunctionName: !Ref HealthFunction
      Action: lambda:InvokeFunction
      Principal: !Sub "arn:aws:iam::${InvokerAccountIdA}:root"
      
  HealthInvokePermissionB:
    Type: AWS::Lambda::Permission
    Condition: UseInvokerAccountB
    Properties:
      FunctionName: !Ref HealthFunction
      Action: lambda:InvokeFunction
      Principal: !Sub "arn:aws:iam::${InvokerAccountIdB}:root"